  <style>
    :root {
      --green:       #1A7A4A;
      --green-light: #22A05E;
      --green-dim:   #E8F5EE;
      --gold:        #D4A853;
      --dark:        #0F1A13;
      --mid:         #3D5246;
      --muted:       #6B8070;
      --surface:     #F7FAF8;
      --white:       #FFFFFF;
      --border:      #D1DED7;
      --error:       #C0392B;
      --radius:      12px;
      --radius-sm:   8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--surface); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-weight: 700; font-size: 22px; color: var(--green); }
    .secure-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-weight: 500; }

    main { flex: 1; max-width: 520px; width: 100%; margin: 0 auto; padding: 24px 16px 48px; }

    .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .card-header-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-dim); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--dark); }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .card-body { padding: 20px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    label .am { font-family: 'Noto Sans Ethiopic', sans-serif; font-weight: 400; color: var(--muted); font-size: 12px; margin-left: 4px; }
    input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--dark); background: var(--white); transition: border-color 0.15s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,122,74,0.08); }
    input.error, select.error { border-color: var(--error); }
    .field-error { font-size: 11px; color: var(--error); margin-top: 4px; display: none; }

    .product-search { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--dark); background: var(--white); outline: none; margin-bottom: 10px; }
    .product-search:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,122,74,0.08); }
    .product-list { max-height: 260px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
    .product-option { padding: 11px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
    .product-option:last-child { border-bottom: none; }
    .product-option:hover { background: var(--green-dim); }
    .product-option.selected { background: var(--green-dim); border-left: 3px solid var(--green); }
    .product-option img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .product-option-name { font-size: 13px; font-weight: 600; color: var(--dark); flex: 1; }
    .product-option-price { font-size: 13px; font-weight: 700; color: var(--green); white-space: nowrap; }

    .qty-row { display: flex; align-items: center; gap: 12px; }
    .qty-btn { width: 36px; height: 36px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dark); transition: border-color 0.15s; flex-shrink: 0; }
    .qty-btn:hover { border-color: var(--green); color: var(--green); }
    .qty-display { font-size: 18px; font-weight: 700; color: var(--dark); min-width: 30px; text-align: center; }

    .total-row { background: var(--green-dim); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .total-label { font-size: 13px; font-weight: 600; color: var(--mid); }
    .total-amount { font-size: 20px; font-weight: 700; color: var(--green); }

    .submit-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: #155F3A; }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    .submit-am { font-family: 'Noto Sans Ethiopic', sans-serif; font-weight: 400; font-size: 13px; opacity: 0.85; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 20px; font-size: 11px; color: var(--muted); }
  </style>

  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">👤</div>
      <div>
        <div class="card-title">Your details</div>
        <div class="card-sub">የእርስዎ መረጃ</div>
      </div>
    </div>
    <div class="card-body">

      <div class="form-group">
        <label>Phone Number <span class="am">/ ስልክ ቁጥር</span></label>
        <input type="text" id="phone" placeholder="09XX XXX XXX" />
        <div class="field-error" id="phone-error">Please enter your phone number</div>
      </div>

      <div class="form-group">
        <label>First Name <span class="am">/ ስምዎ</span></label>
        <input type="text" id="first-name" placeholder="ስም" />
        <div class="field-error" id="name-error">Please enter your name</div>
      </div>

      <div class="form-group">
        <label>Last Name <span class="am">/ የአባት ስም</span></label>
        <input type="text" id="last-name" placeholder="የአባት ስም" />
      </div>

      <div class="form-group">
        <label>Address <span class="am">/ አድራሻ</span></label>
        <input type="text" id="address" placeholder="ፒያሳ" />
      </div>

      <div class="form-group">
        <label>Region <span class="am">/ ክልል</span></label>
        <select id="region">
          <option value="">— Select Region —</option>
          <option>Addis Ababa</option>
          <option>Oromia</option>
          <option>Amhara</option>
          <option>Tigray</option>
          <option>Sidama</option>
          <option>SNNPR</option>
          <option>Somali</option>
          <option>Afar</option>
          <option>Benishangul-Gumuz</option>
          <option>Gambela</option>
          <option>Harari</option>
          <option>Dire Dawa</option>
        </select>
      </div>

      <div class="form-group">
        <label>Delivery Time <span class="am">/ መቼ እንዲይወልልዎት ይፈልጋሉ?</span></label>
        <select id="delivery-time">
          <option value="">— Select —</option>
          <option>As soon as possible / በተቻለ ፍጥነት</option>
          <option>Morning (8am–12pm) / ጠዋት</option>
          <option>Afternoon (12pm–5pm) / ከሰዓት</option>
          <option>Evening (5pm–8pm) / ማታ</option>
        </select>
      </div>

      <div class="form-group">
        <label>Quantity <span class="am">/ ብዛት</span></label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-display" id="qty-display">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>

      <div class="total-row">
        <span class="total-label">Total / ጠቅላላ</span>
        <span class="total-amount" id="total-display">ETB —</span>
      </div>

      <br/>
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        <span id="btn-text">Place Order</span>
        <span class="submit-am">· ትዕዛዝ ያስገቡ</span>
      </button>

    </div>
  </div>

</main>

    { variantId: 45870642135238, title: 'IBRAQ Nude Coral Diamond', price: 13500, image: 'https://cdn.shopify.com/s/files/1/0734/4996/3718/files/photo_2026-05-22_16-47-13.jpg?v=1779457825' },
    { variantId: 45920033341638, title: 'Infant Feeding Suite', price: 6500, image: 'https://cdn.shopify.com/s/files/1/0734/4996/3718/files/photo_2026-06-05_23-56-05.jpg?v=1780693245' },
    { variantId: 45971602276550, title: 'Infantino Cuddle Up Ergonomic Hoodie Baby Carrier', price: 26000, image: 'https://cdn.shopify.com/s/files/1/0734/4996/3718/files/bundle_2.png?v=1782312332' },
  ];

  let selectedProduct = PRODUCTS[0];
  let qty = Math.max(1, parseInt(params.get('quantity') || params.get('qty') || '1', 10) || 1);
  let filteredProducts = [...PRODUCTS];

  function renderProducts(list) {
    const container = document.getElementById('product-list');
    container.innerHTML = list.map((p, i) => `
      <div class="product-option ${p.variantId === selectedProduct.variantId ? 'selected' : ''}"
           onclick="selectProduct(${PRODUCTS.indexOf(p)})">
        <img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'" />
        <span class="product-option-name">${p.title}</span>
        <span class="product-option-price">ETB ${p.price.toLocaleString()}</span>
      </div>
    `).join('');
  }

  function filterProducts() {
    const q = document.getElementById('product-search').value.toLowerCase();
    filteredProducts = q ? PRODUCTS.filter(p => p.title.toLowerCase().includes(q)) : [...PRODUCTS];
    renderProducts(filteredProducts);
  }

  function selectProduct(i) {
    selectedProduct = PRODUCTS[i];
    renderProducts(filteredProducts);
    updateTotal();
    // scroll selected item into view
    const sel = document.querySelector('.product-option.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty-display').textContent = qty;
    updateTotal();
  }

  function updateTotal() {
    const total = selectedProduct.price * qty;
    document.getElementById('total-display').textContent = 'ETB ' + total.toLocaleString();
  }

  // If coming from a product page, pre-select and hide the picker
  if (variantParam) {
    const match = PRODUCTS.find(p => String(p.variantId) === variantParam);
    if (match) {
      selectedProduct = match;
      // Replace product card with a single selected product display
      document.querySelector('.card').innerHTML = `
        <div class="card-header">
          <div class="card-header-icon">🛍️</div>
          <div>
            <div class="card-title">${match.title}</div>
            <div class="card-sub" style="color:var(--green);font-weight:600">ETB ${match.price.toLocaleString()}</div>
          </div>
          <img src="${match.image}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;margin-left:auto;flex-shrink:0" />
        </div>`;
    } else {
      renderProducts(PRODUCTS);
    }
  } else {
    renderProducts(PRODUCTS);
  }

  // Reflect quantity (from URL) + total on load — fixes total showing "ETB —"
  document.getElementById('qty-display').textContent = qty;
  updateTotal();

  // ── Submit ──
  async function handleSubmit() {
    let valid = true;
    const firstName    = document.getElementById('first-name').value.trim();
    const lastName     = document.getElementById('last-name').value.trim();
    const phone        = document.getElementById('phone').value.trim();
    const address      = document.getElementById('address').value.trim();
    const region       = document.getElementById('region').value;
    const deliveryTime = document.getElementById('delivery-time').value;

    if (!firstName) {
      document.getElementById('name-error').style.display = 'block';
      document.getElementById('first-name').classList.add('error');
      valid = false;
    } else {
      document.getElementById('name-error').style.display = 'none';
      document.getElementById('first-name').classList.remove('error');
    }

    if (!phone) {
      document.getElementById('phone-error').style.display = 'block';
      document.getElementById('phone').classList.add('error');
      valid = false;
    } else {
      document.getElementById('phone-error').style.display = 'none';
      document.getElementById('phone').classList.remove('error');
    }

    if (!valid) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div><span>Placing order...</span>';

    if (typeof fbq !== 'undefined') {
      fbq('track', 'InitiateCheckout', { value: selectedProduct.price * qty, currency: 'ETB', num_items: qty });
    }

    const noteExtra = [
      deliveryTime && `Delivery: ${deliveryTime}`,
      address      && `Address: ${address}`,
      region       && `Region: ${region}`,
    ].filter(Boolean).join(' | ');

    const payload = {
      lineItems: [{
        title:    selectedProduct.title,
        quantity: qty,
        price:    String(selectedProduct.price),
        ...(selectedProduct.variantId ? { variant_id: selectedProduct.variantId } : {}),
      }],
      customer: { first_name: firstName, last_name: lastName, phone },
      shippingAddress: {
        first_name:   firstName,
        last_name:    lastName,
        phone,
        address1:     address,
        city:         region || 'Addis Ababa',
        country:      'Ethiopia',
        country_code: 'ET',
      },
      noteExtra,
      ...utmData,
    };

    try {
      const res  = await fetch('/api/gizet/draft-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Fire Meta Pixel Lead event
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead', { value: selectedProduct.price * qty, currency: 'ETB' });
      }

      window.location.href = data.confirmUrl;
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<span id="btn-text">Place Order</span><span class="submit-am">· ትዕዛዝ ያስገቡ</span>';
      alert('Something went wrong: ' + err.message);
    }
  }
</script>
